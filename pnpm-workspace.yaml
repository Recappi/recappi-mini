packages:
  - cli/recappi
  - cli/helpers/*
  - cli/packages/*

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.24

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

onlyBuiltDependencies:
  - better-sqlite3

allowBuilds:
  better-sqlite3: true
  esbuild: true
