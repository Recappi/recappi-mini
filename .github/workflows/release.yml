name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      APP_NAME: RecappiMini
      APP_PATH: ${{ github.workspace }}/build/RecappiMini.app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi

          {
            echo "APP_VERSION=$APP_VERSION"
            echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}"
            echo "DMG_PATH=${GITHUB_WORKSPACE}/build/${APP_NAME}-${APP_VERSION}.dmg"
            echo "CERTIFICATE_P12=${RUNNER_TEMP}/macos_signing_certificate.p12"
            echo "APPSTORE_KEY_P8=${RUNNER_TEMP}/AuthKey.p8"
            echo "KEYCHAIN_PATH=${RUNNER_TEMP}/recappi-release.keychain-db"
          } >> "$GITHUB_ENV"

      - name: Decode signing assets
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPSTORE_API_KEY_P8_BASE64: ${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERTIFICATE_P12"]).write_bytes(
              base64.b64decode(os.environ["MACOS_CERTIFICATE_P12_BASE64"])
          )
          Path(os.environ["APPSTORE_KEY_P8"]).write_bytes(
              base64.b64decode(os.environ["APPSTORE_API_KEY_P8_BASE64"])
          )
          PY

      - name: Import Developer ID certificate
        shell: bash
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_P12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12 \
            -t cert
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          DEVELOPER_ID_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '\"' '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "$DEVELOPER_ID_IDENTITY" ]]; then
            echo "Failed to locate a Developer ID Application identity in the temporary keychain." >&2
            exit 1
          fi

          echo "DEVELOPER_ID_IDENTITY=$DEVELOPER_ID_IDENTITY" >> "$GITHUB_ENV"

      - name: Build signed app bundle
        shell: bash
        env:
          BUILD_CONFIG: release
          RELEASE: "1"
          CODESIGN_IDENTITY: ${{ env.DEVELOPER_ID_IDENTITY }}
        run: |
          set -euo pipefail

          bash scripts/build-app.sh
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package DMG
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$DMG_PATH")"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

      - name: Notarize and staple DMG
        shell: bash
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail

          xcrun notarytool submit "$DMG_PATH" \
            --key "$APPSTORE_KEY_P8" \
            --key-id "$APPSTORE_API_KEY_ID" \
            --issuer "$APPSTORE_API_KEY_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature -vv "$DMG_PATH"

      - name: Upload notarized DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.APP_VERSION }}-dmg
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$DMG_PATH" \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated release for $GITHUB_REF_NAME."
          fi

      - name: Clean up signing assets
        if: always()
        shell: bash
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$CERTIFICATE_P12" "$APPSTORE_KEY_P8"
