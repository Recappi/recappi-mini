name: Release CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional recappi version to publish, e.g. 0.1.1 or 0.1.1-canary.0"
        required: false
        type: string
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: latest
        type: string
      ref:
        description: "Git ref to publish from"
        required: false
        default: main
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-cli.yml"
      - "Package.swift"
      - "RecappiMiniSidecar/**"
      - "scripts/build-cli-helper.sh"
      - "cli/recappi/**"
      - "cli/helpers/**"
      - "cli/packages/contracts/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
    tags:
      - "recappi-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Prepare helper signing keychain
        shell: bash
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_P12="${RUNNER_TEMP}/macos_signing_certificate.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/recappi-cli-release.keychain-db"
          export CERTIFICATE_P12 KEYCHAIN_PATH
          {
            echo "CERTIFICATE_P12=$CERTIFICATE_P12"
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
          } >> "$GITHUB_ENV"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERTIFICATE_P12"]).write_bytes(
              base64.b64decode(os.environ["MACOS_CERTIFICATE_P12_BASE64"])
          )
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_P12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12 \
            -t cert
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          DEVELOPER_ID_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "$DEVELOPER_ID_IDENTITY" ]]; then
            echo "Failed to locate a Developer ID Application identity in the temporary keychain." >&2
            exit 1
          fi

          echo "DEVELOPER_ID_IDENTITY=$DEVELOPER_ID_IDENTITY" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: npm install -g vite-plus@0.2.1

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter recappi check

      - name: Resolve publish version
        id: release_version
        run: node cli/recappi/scripts/resolve-release-version.mjs
        env:
          RECAPPI_CLI_VERSION: ${{ github.event.inputs.version }}

      - name: Refresh publish lockfile metadata
        run: pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts

      - run: ../../scripts/build-cli-helper.sh
        working-directory: cli/recappi
        env:
          CODESIGN_IDENTITY: ${{ env.DEVELOPER_ID_IDENTITY }}
          RELEASE: "1"

      - run: node ../check-helper-pack.mjs "Recappi Recorder.app" Contents/MacOS/RecappiMiniSidecar
        working-directory: cli/helpers/darwin-arm64

      - name: Check recappi package
        working-directory: cli/recappi
        run: |
          ./node_modules/.bin/tsup
          node scripts/check-pack.mjs
          ./node_modules/.bin/publint run --strict
          ./node_modules/.bin/attw --pack . --no-emoji

      - name: Publish Darwin arm64 helper
        run: npm publish --access public --tag "${{ github.event.inputs.npm_tag || 'latest' }}"
        working-directory: cli/helpers/darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish recappi
        run: npm publish --access public --tag "${{ github.event.inputs.npm_tag || 'latest' }}"
        working-directory: cli/recappi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Clean up signing keychain
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
